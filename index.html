<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вопросик</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            overflow: hidden;
            user-select: none;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.15);
            width: 280px;
        }
        h1 {
            color: #ff4d6d;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 30px;
        }
        .buttons-wrapper {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
        }
        .btn {
            border: none;
            padding: 12px 28px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        #yesBtn {
            background-color: #ff4d6d;
            color: white;
        }
        #noBtn {
            background-color: #fff;
            color: #ff4d6d;
            border: 2px solid #ff4d6d;
            position: relative; 
            /* Отключаем случайные ложные срабатывания на смартфонах */
            touch-action: none; 
        }
        .final-screen {
            display: none;
            text-align: center;
        }
        .big-heart {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .final-text {
            color: #ff4d6d;
            font-size: 26px;
            font-weight: bold;
        }
        .heart {
            position: absolute;
            font-size: 24px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Экран с вопросом -->
    <div class="container" id="questBox">
        <h1>Ты меня любишь? 🥺</h1>
        <div class="buttons-wrapper">
            <button class="btn" id="yesBtn" onclick="sayYes()">Да!</button>
            <!-- Добавили event в аргументы функций, чтобы полностью контролировать касание -->
            <button class="btn" id="noBtn" onmouseover="runAway(event)" ontouchstart="runAway(event)" onclick="preventDefaults(event)">Нет</button>
        </div>
    </div>

    <!-- Финальный экран -->
    <div class="container final-screen" id="finalBox">
        <div class="big-heart">💖</div>
        <div class="final-text">Я тебя тоже очень сильно люблю! 🥰</div>
    </div>

    <script>
        try {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        } catch(e) {
            console.log("Запущено вне Telegram");
        }

        const noBtn = document.getElementById('noBtn');
        const questBox = document.getElementById('questBox');
        const finalBox = document.getElementById('finalBox');

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }

        function runAway(e) {
            // Мгновенно останавливаем любые дальнейшие действия браузера (включая клик)
            if (e) {
                e.preventDefault();
                e.stopPropagation();
            }

            if (noBtn.style.position !== 'absolute') {
                noBtn.style.position = 'absolute';
            }
            
            // Расчет случайных координат с учетом безопасных зон
            const width = window.innerWidth - noBtn.offsetWidth - 20;
            const height = window.innerHeight - noBtn.offsetHeight - 20;
            
            const randomX = Math.floor(Math.random() * Math.max(10, width)) + 10;
            const randomY = Math.floor(Math.random() * Math.max(10, height)) + 10;
            
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function sayYes() {
            questBox.style.display = 'none';
            finalBox.style.display = 'block';
            setInterval(createHeart, 200);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            const emojies = ['❤️', '💖', '💝', '💕', '💗'];
            heart.innerText = emojies[Math.floor(Math.random() * emojies.length)];
            
            heart.style.left = Math.random() * window.innerWidth + 'px';
            heart.style.top = window.innerHeight + 'px';
            
            document.body.appendChild(heart);
            
            let position = window.innerHeight;
            const speed = Math.random() * 4 + 3;
            
            const interval = setInterval(() => {
                if (position < -50) {
                    clearInterval(interval);
                    heart.remove();
                } else {
                    position -= speed;
                    heart.style.top = position + 'px';
                }
            }, 10);
        }
    </script>
</body>
</html>
