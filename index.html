<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подарок для тебя</title>
    <!-- Подключаем скрипт Telegram, чтобы страница понимала, что она внутри приложения -->
    <script src="https://telegram.org"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
        }
        h1 {
            color: #ff4d6d;
            font-size: 24px;
            text-align: center;
            animation: heartbeat 1.5s infinite;
        }
        .btn {
            background-color: #ff4d6d;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.1); }
            40% { transform: scale(1); }
        }
        .heart {
            position: absolute;
            font-size: 24px;
            animation: floatUp 1s ease-out forwards;
            pointer-events: none;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>Нажми на кнопку, чтобы открыть подарок 💖</h1>
    <button class="btn" onclick="createHearts(event)">Открыть!</button>

    <script>
        // Инициализируем Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Разворачивает приложение на весь экран

        function createHearts(event) {
            for (let i = 0; i < 10; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerText = '❤️';

                // Случайное смещение вокруг кнопки
                const offsetLeft = (Math.random() - 0.5) * 100;
                const offsetTop = (Math.random() - 0.5) * 100;

                heart.style.left = (event.clientX + offsetLeft) + 'px';
                heart.style.top = (event.clientY + offsetTop) + 'px';

                document.body.appendChild(heart);

                setTimeout(() => { heart.remove(); }, 1000);
            }
        }
    </script>
</body>
</html>
